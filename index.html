
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kengle Chu 毅合實業工作紀錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f5f6f8;--bg2:#ffffff;--bg3:#f0f2f5;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --text:#1a1d24;--text2:#1a1d24;--text3:#3d4251;
  --accent:#2563eb;--accent-dim:#eff4ff;--accent-border:#bfcfff;
  --green:#16a34a;--green-dim:#f0fdf4;--green-border:#bbf7d0;
  --amber:#b45309;--amber-dim:#fffbeb;--amber-border:#fde68a;
  --red:#dc2626;--red-dim:#fef2f2;--red-border:#fecaca;
  --radius:14px;--radius-sm:9px;
  --shadow:0 1px 4px rgba(0,0,0,0.07),0 0 0 1px rgba(0,0,0,0.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;overflow-x:hidden}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 16px 12px;position:sticky;top:0;z-index:20;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:8px}
.header-left .header-name{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.01em;line-height:1.2}
.header-left .header-company{font-size:13px;font-weight:500;color:var(--text2);margin-top:2px}
.month-nav{display:flex;align-items:center;gap:6px}
.month-nav button{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:34px;height:34px;border-radius:9px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav button:active{background:var(--accent-dim);border-color:var(--accent-border)}
.month-label{font-size:15px;font-weight:700;min-width:68px;text-align:center;font-family:'DM Mono',monospace;color:var(--text)}

/* SUMMARY GRID — 2×3 */
.summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 12px 4px}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card.clickable{cursor:pointer}
.stat-card.clickable:active{opacity:0.8}
.stat-card.full{grid-column:1/-1}
.stat-card.salary-card{background:linear-gradient(135deg,#1e40af 0%,#2563eb 100%)}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;letter-spacing:0.04em;text-transform:uppercase;font-weight:500;display:flex;align-items:center;gap:4px}
.stat-label .tap-hint{font-size:9px;background:rgba(0,0,0,0.08);border-radius:4px;padding:1px 5px;color:var(--text3)}
.stat-label .tap-hint-white{font-size:9px;background:rgba(255,255,255,0.2);border-radius:4px;padding:1px 5px;color:rgba(255,255,255,0.8)}
.stat-val{font-size:21px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.stat-val.c-accent{color:var(--accent)}
.stat-val.c-green{color:var(--green)}
.stat-val.c-amber{color:var(--amber)}
.stat-val.c-white{color:#fff;font-size:24px}

/* SALARY POPUP */
.salary-popup{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:90;display:flex;align-items:center;justify-content:center;padding:24px}
.salary-popup.hidden{display:none}
.salary-box{background:#fff;border-radius:20px;padding:28px 24px 22px;max-width:300px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.22);text-align:center}
.salary-box h3{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:18px}
.salary-breakdown{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.sb-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;background:var(--bg3)}
.sb-lbl{font-size:13px;color:var(--text2)}
.sb-val{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.sb-total{background:var(--accent-dim);border:1px solid var(--accent-border)}
.sb-total .sb-lbl{color:var(--accent);font-weight:600}
.sb-total .sb-val{color:var(--accent);font-size:20px}
.salary-close{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:10px 28px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans TC',sans-serif}

/* SAVE STATUS */
.save-status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;transition:opacity 0.3s;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none;opacity:0}
.save-status.show{opacity:1}
.save-status.saved{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.save-status.saving{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border)}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;padding:4px 12px 8px;overflow-x:auto}
.toolbar::-webkit-scrollbar{display:none}
.tool-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:9px 15px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif}
.tool-btn:active{opacity:0.75}
.tool-btn-export{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.tool-btn-clear{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}
.tool-btn-expand{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
.tool-btn-collapse{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}

/* DAYS */
.days-list{padding:4px 12px 90px;display:flex;flex-direction:column;gap:8px}
.day-card{background:var(--bg2);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.day-card.is-weekend{border-left:3px solid var(--accent-border)}
.day-card.is-today{border-left:3px solid var(--accent);background:linear-gradient(135deg,#eff6ff 0%,#e0eaff 100%)}
.day-card.is-today .day-date{color:var(--accent)}
.day-card.is-today .day-weekday{color:var(--accent)}
.day-card.is-holiday{opacity:0.55}
.day-header{display:flex;align-items:center;gap:8px;padding:10px 13px;cursor:pointer;user-select:none}
.day-date{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;min-width:52px;color:var(--text)}
.day-weekday{font-size:12px;color:var(--text3);min-width:14px}
.is-weekend .day-weekday{color:var(--accent)}
.day-times{display:flex;gap:6px;align-items:center;flex:1}
.time-chip{font-size:12px;font-family:'DM Mono',monospace;color:var(--text2);background:var(--bg3);padding:3px 7px;border-radius:6px}
.time-chip.ot{color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border)}
.arrow{font-size:10px;color:var(--text3)}
.day-pay{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);margin-left:auto;white-space:nowrap}
.day-pay.zero{color:var(--text3);font-weight:400}
.holiday-badge{font-size:11px;background:var(--red-dim);color:var(--red);padding:3px 8px;border-radius:6px;margin-left:auto;border:1px solid var(--red-border)}
.chevron{font-size:12px;color:var(--text3);margin-left:4px;transition:transform 0.2s;display:inline-block}
.chevron.open{transform:rotate(180deg)}
.day-summary-line{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:4px 13px 9px}
.dsb{font-size:11px;color:var(--text3)}
.dsb span{color:var(--text2);font-weight:500}
.day-body{border-top:1px solid var(--border);padding:12px 13px;display:flex;flex-direction:column;gap:10px}
.field-row{display:flex;align-items:center;gap:8px}
.field-label{font-size:12px;color:var(--text3);min-width:52px;font-weight:500}
.field-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:15px;font-family:'DM Mono',monospace;padding:9px 11px;outline:none;-webkit-appearance:none;min-width:0}
.field-input:focus{border-color:var(--accent);background:#fff}

/* BUTTONS */
.btn{border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;padding:10px 14px;white-space:nowrap;font-family:'Noto Sans TC',sans-serif}
.btn:active{opacity:0.7}
.btn-primary{background:var(--accent);color:#fff}
.btn-success{background:#16a34a;color:#fff;border:1px solid #15803d}
.btn-warning{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}

/* BADGES */
.badge-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge-item{display:flex;align-items:center;gap:4px}
.badge-lbl{font-size:11px;color:var(--text3)}
.badge{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:20px}
.badge-blue{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.locked-row{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.locked-text{font-size:13px;font-family:'DM Mono',monospace;color:var(--text2);word-break:break-all;flex:1}

/* METER KEYPAD */
.meter-section{display:flex;flex-direction:column;gap:8px}
.meter-chips{display:flex;flex-wrap:wrap;gap:6px;min-height:28px}
.meter-chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);border-radius:20px;padding:4px 9px;font-size:13px;font-family:'DM Mono',monospace;font-weight:600}
.meter-chip-del{background:none;border:none;color:var(--accent);cursor:pointer;font-size:15px;padding:0;line-height:1;font-weight:700;opacity:0.7}
.kp-current{background:var(--bg2);border:1.5px dashed var(--accent-border);border-radius:8px;padding:8px 12px;font-size:20px;font-family:'DM Mono',monospace;color:var(--accent);font-weight:700;text-align:center;min-height:44px;letter-spacing:0.05em}
.kp-current.empty{color:var(--text3);font-size:13px;font-weight:400;display:flex;align-items:center;justify-content:center}
.meter-keypad{background:var(--bg3);border-radius:var(--radius-sm);padding:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.kp-btn{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:14px 6px;font-size:18px;font-family:'DM Mono',monospace;font-weight:500;color:var(--text);cursor:pointer;text-align:center;transition:background 0.08s;user-select:none}
.kp-btn:active{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.kp-btn.kp-back{color:var(--amber);font-size:16px}
.kp-btn.kp-add{background:var(--accent);color:#fff;font-size:14px;font-weight:700;border-color:var(--accent);grid-column:1/-1}
.kp-btn.kp-add:active{background:#1d4ed8}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border-radius:18px;padding:26px 22px 20px;max-width:320px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal-icon{font-size:34px;margin-bottom:10px}
.modal h2{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.modal p{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:22px}
.modal-actions{display:flex;gap:10px}
.modal-actions .btn{flex:1;text-align:center}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:40;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(94vw,420px);background:var(--bg2);z-index:50;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);box-shadow:-4px 0 24px rgba(0,0,0,0.14)}
.drawer.open{transform:translateX(0)}
.drawer-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.drawer-title{font-size:17px;font-weight:700;flex:1;color:var(--text)}
.drawer-close{background:var(--bg3);border:1px solid var(--border2);width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.drawer-filters{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0;background:var(--bg)}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{font-size:12px;color:var(--text3);min-width:32px;font-weight:500}
.drawer-month-nav{display:flex;align-items:center;gap:5px}
.drawer-month-nav button{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:7px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.drawer-month-label{font-size:13px;font-weight:700;min-width:60px;text-align:center;font-family:'DM Mono',monospace;color:var(--text)}
.date-range{display:flex;align-items:center;gap:6px;flex:1}
.date-input{background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:6px 8px;font-size:13px;font-family:'DM Mono',monospace;color:var(--text);outline:none;width:76px}
.date-input:focus{border-color:var(--accent)}
.filter-clear{background:none;border:none;font-size:12px;color:var(--text3);cursor:pointer;padding:4px 6px;border-radius:5px;font-family:'Noto Sans TC',sans-serif}
.filter-clear:active{background:var(--bg3)}
.drawer-body{flex:1;overflow-y:auto;padding:8px 14px 16px}
.drawer-body::-webkit-scrollbar{width:3px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.drawer-empty{text-align:center;color:var(--text3);font-size:14px;padding:40px 20px}
.drawer-total-bar{padding:10px 14px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.dtb-item{font-size:12px;color:var(--text2)}
.dtb-item span{font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.dtb-filter-note{font-size:10px;color:var(--accent);background:var(--accent-dim);padding:2px 7px;border-radius:10px;border:1px solid var(--accent-border)}

/* Detail rows */
.detail-row{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.detail-date{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);min-width:44px}
.detail-wd{font-size:11px;color:var(--text3);min-width:12px}
.detail-time{font-size:12px;font-family:'DM Mono',monospace;color:var(--text3)}
.detail-ot-hrs{font-size:13px;font-family:'DM Mono',monospace;color:var(--accent);flex:1}
.detail-pay{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:var(--green)}
.detail-total{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:var(--amber)}
.detail-work{font-size:12px;font-family:'DM Mono',monospace;color:var(--text2)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px">
  <div style="font-size:48px">🔐</div>
  <div style="font-size:22px;font-weight:700;color:var(--text)">Kengle 工作紀錄</div>
  <div style="font-size:14px;color:var(--text2)">請輸入密碼</div>
  <input id="pwdInput" type="password" placeholder="密碼" style="width:100%;max-width:260px;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border2);font-size:16px;font-family:'DM Mono',monospace;outline:none;text-align:center;background:#fff;color:var(--text)">
  <button id="btnLogin" style="width:100%;max-width:260px;padding:13px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif">進入</button>
  <div id="loginError" style="font-size:13px;color:var(--red);min-height:20px"></div>
</div>

<!-- APP -->
<div id="appRoot" style="display:none">
<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-name">Kengle Chu</div>
      <div class="header-company">毅合實業工作紀錄</div>
    </div>
    <div class="month-nav">
      <button id="btnPrev">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button id="btnNext">›</button>
    </div>
  </div>
</div>

<!-- SUMMARY: 2-col grid, salary full-width on top -->
<div class="summary">
  <!-- 本月加班費 → 點擊顯示薪資彈窗 -->
  <div class="stat-card salary-card full clickable" id="cardSalary">
    <div class="stat-label" style="color:rgba(255,255,255,0.7)">本月薪資
      <span class="tap-hint-white">點擊查看明細</span>
    </div>
    <div class="stat-val c-white" id="sumSalary">$36,000</div>
  </div>
  <!-- 本月加班費 -->
  <div class="stat-card">
    <div class="stat-label">本月加班費</div>
    <div class="stat-val c-accent" id="sumPay">$0</div>
  </div>
  <!-- 加班時數 → 點擊開加班抽屜 -->
  <div class="stat-card clickable" id="cardHours">
    <div class="stat-label">加班時數 <span class="tap-hint">▸ 明細</span></div>
    <div class="stat-val c-accent" id="sumHours">0h 0m</div>
  </div>
  <!-- 總趟次 → 點擊開趟次抽屜 -->
  <div class="stat-card clickable" id="cardTrips">
    <div class="stat-label">總趟次 <span class="tap-hint">▸ 明細</span></div>
    <div class="stat-val c-green" id="sumTrips">0</div>
    <div id="tripsProgressWrap" style="margin-top:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span id="tripsProgressLabel" style="font-size:10px;color:var(--text3);font-weight:500"></span>
        <span id="tripsProgressStar" style="font-size:12px"></span>
      </div>
      <div style="background:var(--bg3);border-radius:20px;height:6px;overflow:hidden">
        <div id="tripsProgressBar" style="height:100%;border-radius:20px;transition:width 0.4s ease;width:0%"></div>
      </div>
    </div>
  </div>
  <!-- 總米數 → 點擊開米數抽屜 -->
  <div class="stat-card clickable" id="cardMeters">
    <div class="stat-label">總米數 <span class="tap-hint">▸ 明細</span></div>
    <div class="stat-val c-amber" id="sumMeters">0</div>
  </div>
</div>

<div class="toolbar">
  <button class="tool-btn tool-btn-expand" id="btnExpandAll">⬇ 展開所有</button>
  <button class="tool-btn tool-btn-collapse" id="btnCollapseAll">⬆ 收合所有</button>
  <button class="tool-btn tool-btn-export" id="btnExport">⬇ 匯出 Excel</button>
  <button class="tool-btn tool-btn-clear" id="btnClear">🗑 清除本月資料</button>
</div>

<div class="days-list" id="daysList"></div>

<!-- Save status toast -->
<div class="save-status" id="saveStatus">✓ 已儲存</div>

<!-- Salary popup -->
<div class="salary-popup hidden" id="salaryPopup">
  <div class="salary-box">
    <h3>本月薪資明細</h3>
    <div class="salary-breakdown">
      <div class="sb-row"><span class="sb-lbl">底薪</span><span class="sb-val">$36,000</span></div>
      <div class="sb-row"><span class="sb-lbl">加班費</span><span class="sb-val" id="popupOT">$0</span></div>
      <div class="sb-row"><span class="sb-lbl">超100趟次獎金</span><span class="sb-val" id="popupMeterBonus">$0</span></div>
      <div class="sb-row sb-total"><span class="sb-lbl">合計薪資</span><span class="sb-val" id="popupTotal">$36,000</span></div>
    </div>
    <button class="salary-close" id="salaryClose">關閉</button>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal">
    <div class="modal-icon">⚠️</div>

<script type="module">
const STORE_KEY='kengle_data_v4'; // bumped version for per-month migration
const WD=['日','一','二','三','四','五','六'];
const BASE_SALARY=36000;

// ── FIREBASE ─────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZlK1yptGoIAcmNuZp99sgANCUJ1crdkI",
  authDomain: "kenglework.firebaseapp.com",
  projectId: "kenglework",
  storageBucket: "kenglework.firebasestorage.app",
  messagingSenderId: "560347469856",
  appId: "1:560347469856:web:4104600a45bf84378c0445"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
// Per-month document references: workdata/{year_mm}
function monthDocRef(mk){ return doc(db, 'workdata', mk); }

// ── AUTH UI ───────────────────────────────────────────────
function showLoginScreen(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appRoot').style.display='none';
  setTimeout(()=>document.getElementById('pwdInput').focus(),100);
}
function hideLoginScreen(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appRoot').style.display='block';
}
async function tryLogin(){
  const pwd=document.getElementById('pwdInput').value;
  const errEl=document.getElementById('loginError');
  const btn=document.getElementById('btnLogin');
  if(!pwd){errEl.textContent='請輸入密碼';return;}
  btn.textContent='驗證中…';btn.disabled=true;errEl.textContent='';
  try{
    await signInWithEmailAndPassword(auth,'marsgorock@gmail.com',pwd);
  }catch(e){
    errEl.textContent='❌ 密碼錯誤';
    document.getElementById('pwdInput').value='';
    document.getElementById('pwdInput').focus();
  }finally{
    btn.textContent='進入';btn.disabled=false;
  }
}
document.getElementById('btnLogin').addEventListener('click', tryLogin);
document.getElementById('pwdInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });

// ── STORAGE (per-month documents) ────────────────────────
let saveTimer=null;

// Load a single month from Firestore: workdata/{year_mm}
async function loadMonth(mk){
  try{
    const snap=await getDoc(monthDocRef(mk));
    if(snap.exists()) return snap.data().days || {};
    return {};
  }catch(e){
    console.warn('Firebase loadMonth failed',mk,e);
    return {};
  }
}

// Load all months from old single-doc format (migration)
async function migrateOldData(){
  try{
    const oldRef=doc(db,'workdata','kengle');
    const snap=await getDoc(oldRef);
    if(snap.exists()&&snap.data().payload){
      const old=JSON.parse(snap.data().payload);
      console.log('Migrating old data...',Object.keys(old));
      for(const mk of Object.keys(old)){
        await setDoc(monthDocRef(mk),{days:old[mk],updatedAt:Date.now()});
      }
      // Delete old doc by overwriting with migration flag
      await setDoc(oldRef,{migrated:true,migratedAt:Date.now()});
      console.log('Migration complete');
      return old;
    }
  }catch(e){
    console.warn('Migration check failed',e);
  }
  return null;
}

async function loadFromCloud(){
  try{
    // Check if old single-doc exists and migrate
    const oldRef=doc(db,'workdata','kengle');
    const oldSnap=await getDoc(oldRef);
    if(oldSnap.exists()&&oldSnap.data().payload){
      const migrated=await migrateOldData();
      if(migrated) return migrated;
    }
    // Load current month only; other months loaded on demand
    const now=new Date();
    const mk=monthKey(now.getFullYear(),now.getMonth());
    const days=await loadMonth(mk);
    return {[mk]:days};
  }catch(e){
    console.warn('Firebase load failed, using localStorage',e);
    try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e2){return {};}
  }
}

// Ensure month data is loaded before viewing it
async function ensureMonthLoaded(mk){
  if(allData[mk]) return; // already loaded
  allData[mk]=await loadMonth(mk);
}

function save(){
  showSaveStatus('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      // Only save the currently viewed month
      const mk=monthKey(viewYear,viewMonth);
      await setDoc(monthDocRef(mk),{days:allData[mk]||{},updatedAt:Date.now()});
      // localStorage keeps full cache
      try{localStorage.setItem(STORE_KEY,JSON.stringify(allData));}catch(e){}
    }catch(e){
      console.warn('Firebase save failed, using localStorage',e);
      try{localStorage.setItem(STORE_KEY,JSON.stringify(allData));}catch(e2){}
    }
    showSaveStatus('saved');
  },600);
}
function showSaveStatus(s){
  const el=document.getElementById('saveStatus');
  el.className='save-status '+s+' show';
  el.textContent=s==='saving'?'儲存中…':'✓ 已儲存';
  if(s==='saved') setTimeout(()=>el.classList.remove('show'),1800);
}

let allData={};
let viewYear,viewMonth;

// ── HELPERS ──────────────────────────────────────────────
function monthKey(y,m){return `${y}_${String(m+1).padStart(2,'0')}`;}

function getRows(y,m){
  const mk=monthKey(y,m);
  if(!allData[mk]) allData[mk]={};
  const rows=[];
  for(let d=1;d<=31;d++){
    const dt=new Date(y,m,d);
    if(dt.getMonth()!==m) break;
    const dk=String(d);
    if(!allData[mk][dk]) allData[mk][dk]={holiday:false,otInput:'',endTime:'17:00',metersInput:'',metersArr:[],metersLocked:false,timeLocked:false,expanded:false};
    if(!allData[mk][dk].metersArr) allData[mk][dk].metersArr=parseMeters(allData[mk][dk].metersInput||'');
    rows.push({d,dt,wd:dt.getDay(),isWeekend:dt.getDay()===0||dt.getDay()===6,dk,data:allData[mk][dk]});
  }
  return rows;
}

function parseMeters(str){
  if(!str||!str.trim()) return [];
  return str.trim().split(/[\s,]+/).filter(v=>v!=='').map(v=>parseFloat(v)||0).filter(v=>v>0);
}

function normalizeEndMins(h,m){
  // 若輸入時間 < 17:00，視為跨午夜（隔天）加 24h
  const raw=h*60+m;
  return raw<17*60?raw+24*60:raw;
}
function calcPay(h,m){
  const end=normalizeEndMins(h,m);
  if(end<=17*60) return 0;
  let t=0;
  [{f:17*60,to:20*60,r:3.5},{f:20*60,to:24*60,r:4.5},{f:24*60,to:32*60,r:9}].forEach(s=>{
    const a=s.f,b=Math.min(s.to,end);
    if(b>a) t+=(b-a)*s.r;
  });
  return Math.round(t);
}

function calcOTBreakdown(endTime){
  const[h,m]=endTime.split(':').map(Number);
  const end=normalizeEndMins(h,m);
  if(end<=17*60) return [];
  const segs=[
    {label:'17:00 – 20:00',f:17*60,to:20*60,rate:3.5},
    {label:'20:00 – 00:00',f:20*60,to:24*60,rate:4.5},
    {label:'00:00 – 08:00',f:24*60,to:32*60,rate:9}
  ];
  return segs.map(s=>{
    const a=s.f,b=Math.min(s.to,end);
    if(b<=a) return null;
    const mins=b-a;const pay=Math.round(mins*s.rate);
    return{label:s.label,mins,rate:s.rate,pay};
  }).filter(Boolean);
}
function showOTBreakdown(endTime,total){
  const segs=calcOTBreakdown(endTime);
  let html='<div style="display:flex;flex-direction:column;gap:8px">';
  segs.forEach(s=>{
    const hh=Math.floor(s.mins/60),mm=s.mins%60;
    const dur=hh>0?`${hh}h${mm>0?String(mm).padStart(2,'0')+'m':''}`:`${mm}m`;
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg3);padding:9px 12px;border-radius:9px"><span style="font-size:12px;color:var(--text2)">${s.label}<br><span style="font-size:11px;color:var(--text3)">${dur} × $${s.rate}/min</span></span><span style="font-size:15px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)">$${s.pay.toLocaleString()}</span></div>`;
  });
  html+=`<div style="display:flex;justify-content:space-between;align-items:center;background:var(--accent-dim);border:1px solid var(--accent-border);padding:9px 12px;border-radius:9px"><span style="font-size:13px;font-weight:600;color:var(--accent)">加班費合計</span><span style="font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)">$${total.toLocaleString()}</span></div>`;
  html+='</div>';
  document.getElementById('otBreakContent').innerHTML=html;
  document.getElementById('otBreakPopup').classList.remove('hidden');
}
function arrStats(arr){
  const a=arr||[];
  return{count:a.length,total:a.reduce((s,v)=>s+v,0)};
}

function fmtNum(n){
  if(Number.isInteger(n)) return String(n);
  return parseFloat(n.toFixed(3)).toString();
}

function parseFmtTime(raw){
  const s=raw.replace(/[^0-9]/g,'');
  if(!s.length) return null;
  let h,m;
  if(s.length<=2){h=parseInt(s);m=0;}
  else if(s.length===3){h=parseInt(s[0]);m=parseInt(s.slice(1));}
  else{h=parseInt(s.slice(0,2));m=parseInt(s.slice(2,4));}
  if(isNaN(h)||isNaN(m)||h>23||m>59) return null;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}

function nowStr(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function fmtDate(dt){return `${dt.getMonth()+1}/${String(dt.getDate()).padStart(2,'0')}`;}
function syncMetersInput(d){d.metersInput=(d.metersArr||[]).join(' ');}

// ── SUMMARY ──────────────────────────────────────────────
const TRIP_BONUS_THRESHOLD=100; // 累積趟次超過100趟後，超過的每趟+$150
const TRIP_BONUS_PER_TRIP=150;

function calcMeterBonus(rows){
  // 計算當月總趟次，超過100趟的部分每趟+$150
  let cumTrips=0;
  rows.forEach(r=>{
    if(r.data.holiday) return;
    cumTrips+=(r.data.metersArr||[]).length;
  });
  const bonusTrips=Math.max(0, cumTrips-TRIP_BONUS_THRESHOLD);
  return bonusTrips*TRIP_BONUS_PER_TRIP;
}

function updateSummary(rows){
  let tpay=0,totMin=0,ttrips=0,tmeters=0;
  rows.forEach(r=>{
    if(r.data.holiday) return;
    const[eh,em]=r.data.endTime.split(':').map(Number);
    tpay+=calcPay(eh,em);
    totMin+=Math.max(0,normalizeEndMins(eh,em)-17*60);
    const res=arrStats(r.data.metersArr);
    ttrips+=res.count;tmeters+=res.total;
  });
  const meterBonus=calcMeterBonus(rows);
  const totalSalary=BASE_SALARY+tpay+meterBonus;
  document.getElementById('sumPay').textContent='$'+tpay.toLocaleString();
  document.getElementById('sumSalary').textContent='$'+totalSalary.toLocaleString();
  document.getElementById('sumHours').textContent=Math.floor(totMin/60)+'h '+(totMin%60)+'m';
  document.getElementById('sumTrips').textContent=ttrips;
  document.getElementById('sumMeters').textContent=fmtNum(tmeters)+' m';

  // ── trips progress bar ──
  const pct=Math.min(ttrips/TRIP_BONUS_THRESHOLD*100,100);
  const exceeded=ttrips>TRIP_BONUS_THRESHOLD;
  const bar=document.getElementById('tripsProgressBar');
  const lbl=document.getElementById('tripsProgressLabel');
  const star=document.getElementById('tripsProgressStar');
  if(exceeded){
    bar.style.width='100%';
    bar.style.background='linear-gradient(90deg,#16a34a,#4ade80)';
    lbl.textContent=`超標 +${ttrips-TRIP_BONUS_THRESHOLD} 趟　獎金 $${((ttrips-TRIP_BONUS_THRESHOLD)*TRIP_BONUS_PER_TRIP).toLocaleString()}`;
    lbl.style.color='#15803d';
    lbl.style.fontWeight='600';
    star.textContent='⭐';
  } else {
    bar.style.width=pct+'%';
    bar.style.background='linear-gradient(90deg,#2563eb,#60a5fa)';
    lbl.textContent=`${ttrips} / ${TRIP_BONUS_THRESHOLD} 趟　還差 ${TRIP_BONUS_THRESHOLD-ttrips} 趟達標`;
    lbl.style.color='var(--text3)';
    lbl.style.fontWeight='500';
    star.textContent=ttrips>=80?'🌟':'';
  }

  // keep popup data in sync
  document.getElementById('popupOT').textContent='$'+tpay.toLocaleString();
  document.getElementById('popupMeterBonus').textContent='$'+meterBonus.toLocaleString();
  document.getElementById('popupTotal').textContent='$'+totalSalary.toLocaleString();
}

// ── KEYPAD STATE ──────────────────────────────────────────
const kpState={};
function kpKey(dk,mk){return mk+'_'+dk;}

// ── RENDER ────────────────────────────────────────────────
function renderAll(){
  const now=new Date();
  const todayY=now.getFullYear(),todayM=now.getMonth(),todayD=now.getDate();
  document.getElementById('monthLabel').textContent=`${viewYear}/${String(viewMonth+1).padStart(2,'0')}`;
  const rows=getRows(viewYear,viewMonth);
  updateSummary(rows);
  const list=document.getElementById('daysList');
  list.innerHTML='';
  const mk=monthKey(viewYear,viewMonth);

  // Pre-compute per-day bonus trip counts
  const dayBonusMap={};
  let _cum=0;
  rows.forEach(r=>{
    if(r.data.holiday){dayBonusMap[r.dk]=0;return;}
    let bonus=0;
    (r.data.metersArr||[]).forEach(()=>{_cum++;if(_cum>TRIP_BONUS_THRESHOLD)bonus++;});
    dayBonusMap[r.dk]=bonus;
  });

  rows.forEach(r=>{
    const isToday=viewYear===todayY&&viewMonth===todayM&&r.d===todayD;
    const d=r.data;
    const payVal=d.holiday?0:(()=>{const[h,m]=d.endTime.split(':').map(Number);return calcPay(h,m);})();
    const mRes=arrStats(d.metersArr);
    const dayBonus=dayBonusMap[r.dk]||0;
    const kpk=kpKey(r.dk,mk);
    if(!kpState[kpk]) kpState[kpk]={current:''};

    const card=document.createElement('div');
    card.className='day-card'+(r.isWeekend?' is-weekend':'')+(d.holiday?' is-holiday':'')+(isToday?' is-today':'');

    // HEADER
    const hasData=d.holiday||d.timeLocked||(d.metersArr&&d.metersArr.length>0);
    const hdr=document.createElement('div');hdr.className='day-header';
    const dateEl=document.createElement('div');dateEl.className='day-date';
    if(hasData){const ck=document.createElement('span');ck.textContent='✓';ck.style.cssText='font-size:11px;color:var(--green);margin-right:4px;font-weight:700';dateEl.appendChild(ck);}
    dateEl.appendChild(document.createTextNode(fmtDate(r.dt)));
    const wdEl=document.createElement('div');wdEl.className='day-weekday';wdEl.textContent=WD[r.wd];
    hdr.appendChild(dateEl);hdr.appendChild(wdEl);

    if(d.holiday){
      const hb=document.createElement('div');hb.className='holiday-badge';hb.textContent='休假';hdr.appendChild(hb);
    } else {
      const times=document.createElement('div');times.className='day-times';
      const c1=document.createElement('span');c1.className='time-chip';c1.textContent='08:00';
      const arr=document.createElement('span');arr.className='arrow';arr.textContent='→';
      const c2=document.createElement('span');c2.className='time-chip'+(d.endTime!=='17:00'?' ot':'');
      c2.textContent=d.endTime;
      times.appendChild(c1);times.appendChild(arr);times.appendChild(c2);hdr.appendChild(times);
      const payEl=document.createElement('div');payEl.className='day-pay'+(payVal===0?' zero':'');
      payEl.textContent=payVal>0?'$'+payVal.toLocaleString():'—';
      if(payVal>0){payEl.style.cssText='cursor:pointer;text-decoration:underline dotted';payEl.title='查看加班費明細';payEl.addEventListener('click',e=>{e.stopPropagation();showOTBreakdown(d.endTime,payVal);});}
      hdr.appendChild(payEl);
    }

    const chev=document.createElement('span');chev.className='chevron'+(d.expanded?' open':'');chev.textContent='▾';hdr.appendChild(chev);
    hdr.addEventListener('click',()=>{
      const wasExpanded=d.expanded;
      if(!wasExpanded){
        // collapse all others
        const mk2=monthKey(viewYear,viewMonth);
        const allRows=getRows(viewYear,viewMonth);
        allRows.forEach(rr=>{if(rr.dk!==r.dk) rr.data.expanded=false;});
      }
      d.expanded=!wasExpanded;save();renderAll();
    });
    card.appendChild(hdr);

    // collapsed summary
    if(!d.expanded&&!d.holiday&&mRes.count>0){
      const sl=document.createElement('div');sl.className='day-summary-line';
      const bonusHtml=dayBonus>0?`<span style="margin-left:auto;font-size:11px;color:var(--green);font-weight:700">+$${(dayBonus*150).toLocaleString()}</span>`:'';
      sl.innerHTML=`<span class="dsb">趟次 <span>${mRes.count}</span></span><span class="dsb">米數 <span>${fmtNum(mRes.total)} m</span></span>${d.metersLocked?'<span class="badge badge-green" style="font-size:10px;padding:2px 7px">已確認</span>':''}${bonusHtml}`;
      card.appendChild(sl);
    }

    // BODY
    if(d.expanded){
      const body=document.createElement('div');body.className='day-body';

      if(d.holiday){
        const btn=document.createElement('button');btn.className='btn btn-ghost';btn.textContent='取消休假';
        btn.addEventListener('click',()=>{d.holiday=false;d.expanded=true;save();renderAll();});
        body.appendChild(btn);
      } else {
        // ── Clock-out row ──
        const otRow=document.createElement('div');otRow.className='field-row';
        const otLbl=document.createElement('div');otLbl.className='field-label';otLbl.textContent='下班時間';

        if(d.timeLocked){
          const ld=document.createElement('div');ld.className='locked-row';
          const lt=document.createElement('span');lt.className='locked-text';lt.textContent=d.endTime;
          const editBtn=document.createElement('button');editBtn.className='btn btn-warning';editBtn.textContent='修改';
          editBtn.addEventListener('click',()=>{
            showModal('確認修改下班時間？',`目前記錄為 ${d.endTime}，確定要重新修改嗎？`,()=>{d.timeLocked=false;save();renderAll();});
          });
          ld.appendChild(lt);ld.appendChild(editBtn);
          otRow.appendChild(otLbl);otRow.appendChild(ld);
        } else {
          const otInp=document.createElement('input');otInp.type='text';otInp.inputMode='numeric';
          otInp.className='field-input';otInp.placeholder='';otInp.value=d.otInput;
          otInp.addEventListener('input',()=>{d.otInput=otInp.value;save();});
          const btnWrap=document.createElement('div');btnWrap.style.cssText='display:flex;gap:6px;flex-shrink:0';
          const noOtBtn=document.createElement('button');noOtBtn.className='btn btn-ghost';noOtBtn.textContent='無加班';noOtBtn.style.cssText='font-size:12px;padding:10px 10px';
          noOtBtn.addEventListener('click',()=>{
            const doIt=()=>{d.endTime='17:00';d.otInput='';d.timeLocked=true;save();renderAll();};
            if(d.timeLocked) showModal('確認覆蓋下班時間？',`目前記錄為 ${d.endTime}，確定要改為無加班 (17:00) 嗎？`,doIt);else doIt();
          });
          const otBtn=document.createElement('button');otBtn.className='btn btn-primary';otBtn.textContent='加班';otBtn.style.cssText='font-size:12px;padding:10px 10px';
          otBtn.addEventListener('click',()=>{
            const raw=otInp.value.trim();
            const t=raw===''?nowStr():parseFmtTime(raw);
            if(!t){otInp.style.borderColor='var(--red)';setTimeout(()=>otInp.style.borderColor='',1200);return;}
            const doIt=()=>{d.endTime=t;d.otInput=raw;d.timeLocked=true;save();renderAll();};
            if(d.timeLocked) showModal('確認覆蓋下班時間？',`目前記錄為 ${d.endTime}，確定要改為 ${t} 嗎？`,doIt);else doIt();
          });
          btnWrap.appendChild(noOtBtn);btnWrap.appendChild(otBtn);
          otRow.appendChild(otLbl);otRow.appendChild(otInp);otRow.appendChild(btnWrap);
        }
        body.appendChild(otRow);

        // ── Meters section ──
        const mSec=document.createElement('div');mSec.className='meter-section';
        const mHdr=document.createElement('div');mHdr.style.cssText='display:flex;align-items:center;gap:8px';
        const mLbl=document.createElement('div');mLbl.className='field-label';mLbl.textContent='米數';mHdr.appendChild(mLbl);

        if(d.metersLocked){
          const ld=document.createElement('div');ld.className='locked-row';
          const chips=document.createElement('div');chips.className='meter-chips';
          (d.metersArr||[]).forEach(v=>{
            const c=document.createElement('span');c.className='meter-chip';c.textContent=fmtNum(v)+' m';chips.appendChild(c);
          });
          if(!(d.metersArr||[]).length){const e=document.createElement('span');e.style.cssText='font-size:13px;color:var(--text3)';e.textContent='—';chips.appendChild(e);}
          const editBtn=document.createElement('button');editBtn.className='btn btn-warning';editBtn.style.flexShrink='0';editBtn.textContent='修改';
          editBtn.addEventListener('click',()=>{
            showModal('確認修改米數？','確定要重新修改已確認的米數嗎？',()=>{d.metersLocked=false;save();renderAll();});
          });
          ld.appendChild(chips);ld.appendChild(editBtn);mHdr.appendChild(ld);
          mSec.appendChild(mHdr);
          const br=document.createElement('div');br.className='badge-row';
          br.innerHTML=`<div class="badge-item"><span class="badge-lbl">趟次</span><span class="badge badge-blue">${mRes.count}</span></div><div class="badge-item"><span class="badge-lbl">米數計</span><span class="badge badge-green">${fmtNum(mRes.total)}</span></div>`;
          mSec.appendChild(br);
        } else {
          mSec.appendChild(mHdr);
          const kps=kpState[kpk];

          // chips
          const chips=document.createElement('div');chips.className='meter-chips';
          (d.metersArr||[]).forEach((v,i)=>{
            const c=document.createElement('span');c.className='meter-chip';
            c.appendChild(document.createTextNode(fmtNum(v)+' m'));
            const del=document.createElement('button');del.className='meter-chip-del';del.textContent='×';
            del.addEventListener('click',e=>{e.stopPropagation();d.metersArr.splice(i,1);syncMetersInput(d);save();renderAll();});
            c.appendChild(del);chips.appendChild(c);
          });
          if(!(d.metersArr||[]).length){const ph=document.createElement('span');ph.style.cssText='font-size:12px;color:var(--text3)';ph.textContent='尚無米數';chips.appendChild(ph);}
          mSec.appendChild(chips);

          // current input display
          const kpCurr=document.createElement('div');
          kpCurr.className='kp-current'+(kps.current===''?' empty':'');
          kpCurr.textContent=kps.current===''?'輸入數值，按 ＋ 加入':kps.current;
          mSec.appendChild(kpCurr);

          // keypad: 1-2-3 / 4-5-6 / 7-8-9 / . 0 ⌫
          const kpad=document.createElement('div');kpad.className='meter-keypad';
          const keys=['1','2','3','4','5','6','7','8','9','.','0','⌫'];
          keys.forEach(k=>{
            const b=document.createElement('button');b.className='kp-btn';
            if(k==='⌫') b.classList.add('kp-back');
            b.textContent=k;
            b.addEventListener('click',()=>{
              if(k==='⌫'){
                kps.current=kps.current.slice(0,-1);
              } else if(k==='.'){
                if(!kps.current.includes('.')) kps.current+='.';
              } else {
                if(kps.current.length<10) kps.current+=k;
              }
              kpCurr.textContent=kps.current===''?'輸入數值，按 ＋ 加入':kps.current;
              kpCurr.className='kp-current'+(kps.current===''?' empty':'');
            });
            kpad.appendChild(b);
          });
          // + add button (span 2 cols) + confirm button (1 col)
          const addBtn=document.createElement('button');addBtn.className='kp-btn kp-add';addBtn.style.cssText='grid-column:span 2';addBtn.textContent='＋  加入';
          addBtn.addEventListener('click',()=>{
            const v=parseFloat(kps.current);
            if(!kps.current||isNaN(v)||v<=0){kpCurr.style.border='1.5px solid var(--red)';setTimeout(()=>kpCurr.style.border='',1000);return;}
            if(!d.metersArr) d.metersArr=[];
            d.metersArr.push(v);syncMetersInput(d);kps.current='';save();renderAll();
          });
          const confBtn=document.createElement('button');confBtn.className='btn btn-success';confBtn.style.cssText='border-radius:8px;font-size:13px;font-weight:700';confBtn.textContent='確認米數';
          confBtn.addEventListener('click',()=>{d.metersLocked=true;save();renderAll();});
          kpad.appendChild(addBtn);kpad.appendChild(confBtn);
          mSec.appendChild(kpad);

          // badges only
          const btm=document.createElement('div');btm.style.cssText='display:flex;align-items:center;gap:8px;flex-wrap:wrap';
          const br=document.createElement('div');br.className='badge-row';br.style.flex='1';
          br.innerHTML=`<div class="badge-item"><span class="badge-lbl">趟次</span><span class="badge badge-blue">${mRes.count}</span></div><div class="badge-item"><span class="badge-lbl">米數計</span><span class="badge badge-green">${fmtNum(mRes.total)}</span></div>`;
          btm.appendChild(br);
          mSec.appendChild(btm);
        }
        body.appendChild(mSec);

        // holiday btn
        const holBtn=document.createElement('button');holBtn.className='btn btn-danger';holBtn.textContent='標記休假';
        holBtn.addEventListener('click',()=>{d.holiday=true;d.endTime='17:00';d.otInput='';d.expanded=true;save();renderAll();});
        body.appendChild(holBtn);
      }
      card.appendChild(body);
    }
    list.appendChild(card);
  });
}

  });

});

function getFilteredRows(y,m,fromD,toD,includeHoliday){
  const rows=getRows(y,m);
  return rows.filter(r=>{
    if(!includeHoliday&&r.data.holiday) return false;
    if(fromD&&r.d<fromD) return false;
    if(toD&&r.d>toD) return false;
    return true;
  });
}

// ── OT DRAWER RENDER ──────────────────────────────────────
function renderOTDrawer(){
  document.getElementById('otMonthLabel').textContent=`${otDY}/${String(otDM+1).padStart(2,'0')}`;
  const fromD=parseInt(document.getElementById('otDateFrom').value)||null;
  const toD=parseInt(document.getElementById('otDateTo').value)||null;
  const isFiltered=fromD||toD;

  // ALL rows for work-day count (no holiday, no date filter)
  const allRows=getFilteredRows(otDY,otDM,null,null,false);
  // Filtered rows for totals/display
  const rows=getFilteredRows(otDY,otDM,fromD,toD,false);

  const body=document.getElementById('otDrawerBody');
  body.innerHTML='';
  let totalPay=0,totalOTMin=0,totalWorkDays=0,hasOT=false;

  rows.forEach(r=>{
    const d=r.data;
    const[eh,em]=d.endTime.split(':').map(Number);
    const endM=normalizeEndMins(eh,em);
    const otMin=Math.max(0,endM-17*60);
    const pay=calcPay(eh,em);
    totalWorkDays++;
    if(otMin===0&&pay===0) return;
    hasOT=true;
    totalPay+=pay;totalOTMin+=otMin;
    const row=document.createElement('div');row.className='detail-row';
    row.innerHTML=`<span class="detail-date">${fmtDate(r.dt)}</span><span class="detail-wd">${WD[r.wd]}</span><span class="detail-time">${d.endTime}</span><span class="detail-ot-hrs">+${Math.floor(otMin/60)}h${otMin%60>0?String(otMin%60).padStart(2,'0')+'m':''}</span><span class="detail-pay">$${pay.toLocaleString()}</span>`;
    body.appendChild(row);
  });

  if(!hasOT){body.innerHTML='<div class="drawer-empty">此月份無加班記錄</div>';}

  const bar=document.getElementById('otTotalBar');
  let html=`<span class="dtb-item">上班天數 <span>${totalWorkDays}</span></span><span class="dtb-item">加班費 <span>$${totalPay.toLocaleString()}</span></span><span class="dtb-item">加班時數 <span>${Math.floor(totalOTMin/60)}h ${totalOTMin%60}m</span></span>`;
  if(isFiltered) html+=`<span class="dtb-filter-note">篩選區間</span>`;
  bar.innerHTML=html;
}

// ── TRIPS DRAWER RENDER ──────────────────────────────────
function renderTripsDrawer(){
  document.getElementById('tripsMonthLabel').textContent=`${tripsDY}/${String(tripsDM+1).padStart(2,'0')}`;
  const rows=getFilteredRows(tripsDY,tripsDM,null,null,false);
  const body=document.getElementById('tripsDrawerBody');
  body.innerHTML='';

  const THRESHOLD=100; // 累積趟次達此值後，後續趟次每趟 +$150
  let cumTrips=0;
  let bonusTrips=0;
  let thresholdCrossedDay=null; // 哪天第100趟達標
  let hasAny=false;

  // First pass: figure out per-day data including bonus trip counts
  const dayItems=[];
  rows.forEach(r=>{
    const d=r.data;
    const trips=d.metersArr||[];
    if(trips.length===0) return;
    const dayTrips=[];
    trips.forEach(v=>{
      cumTrips++;
      const tripIsBonus=cumTrips>THRESHOLD; // 第101趟起才算獎勵
      if(tripIsBonus) bonusTrips++;
      const crossesThreshold=(cumTrips===THRESHOLD+1); // 第101趟 = 達標後第一趟
      if(crossesThreshold&&thresholdCrossedDay===null) thresholdCrossedDay=fmtDate(r.dt);
      dayTrips.push({v,tripIsBonus,crossesThreshold,tripNum:cumTrips});
    });
    dayItems.push({r,dayTrips});
    hasAny=true;
  });

  if(!hasAny){body.innerHTML='<div class="drawer-empty">此月份無趟次記錄</div>';}

  dayItems.forEach(({r,dayTrips})=>{
    const row=document.createElement('div');
    // Check if any bonus trips in this day
    const hasDayBonus=dayTrips.some(t=>t.tripIsBonus);
    const hasDayCross=dayTrips.some(t=>t.crossesThreshold);
    row.style.cssText=`background:${hasDayBonus?'#f0fdf4':'var(--bg)'};border-radius:10px;padding:10px 12px;margin-bottom:6px;border:${hasDayCross?'1.5px solid #16a34a':'1px solid transparent'}`;

    const topLine=document.createElement('div');
    topLine.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap';

    const dateSpan=document.createElement('span');
    dateSpan.style.cssText='font-size:13px;font-weight:700;font-family:"DM Mono",monospace;color:var(--text);min-width:44px';
    dateSpan.textContent=fmtDate(r.dt);

    const wdSpan=document.createElement('span');
    wdSpan.style.cssText='font-size:11px;color:var(--text3);min-width:12px';
    wdSpan.textContent=WD[r.wd];

    topLine.appendChild(dateSpan);
    topLine.appendChild(wdSpan);

    if(hasDayCross){
      const badge=document.createElement('span');
      badge.style.cssText='font-size:10px;background:#16a34a;color:#fff;padding:2px 8px;border-radius:10px;font-weight:700';
      badge.textContent='⭐ 達標日';
      topLine.appendChild(badge);
    }

    const tripCount=dayTrips.length;
    const bonusCount=dayTrips.filter(t=>t.tripIsBonus).length;
    const tripSummary=document.createElement('span');
    tripSummary.style.cssText='margin-left:auto;font-size:12px;font-family:"DM Mono",monospace;font-weight:600;color:var(--text2)';
    tripSummary.textContent=`${tripCount} 趟`;
    topLine.appendChild(tripSummary);

    row.appendChild(topLine);

    // Day bonus summary only (no chips)
    if(bonusCount>0){
      const bonusLine=document.createElement('div');
      bonusLine.style.cssText='margin-top:4px;font-size:12px;color:#15803d;font-weight:600';
      bonusLine.textContent=`達標趟次 ${bonusCount} 趟 × $150 = $${(bonusCount*150).toLocaleString()}`;
      row.appendChild(bonusLine);
    }

    body.appendChild(row);
  });

  // total bar
  const totalBonus=bonusTrips*150;
  const bar=document.getElementById('tripsTotalBar');
  let html=`<span class="dtb-item">總趟次 <span>${cumTrips}</span></span>`;
  if(thresholdCrossedDay) html+=`<span class="dtb-item">第101趟達標日 <span>${thresholdCrossedDay}</span></span>`;
  if(bonusTrips>0) html+=`<span class="dtb-item" style="color:#15803d">超100趟獎金 <span style="color:#16a34a">${bonusTrips} 趟 × $150 = $${totalBonus.toLocaleString()}</span></span>`;
  bar.innerHTML=html;
}

// ── SCROLL TO TODAY ──────────────────────────────────────
function scrollToToday(){
  const todayCard=document.querySelector('.day-card.is-today');
  if(todayCard) todayCard.scrollIntoView({behavior:'smooth',block:'center'});
}
// ── INIT ──────────────────────────────────────────────────
async function initApp(){
  const now=new Date();
  viewYear=now.getFullYear();viewMonth=now.getMonth();
  // Load current month (with migration if needed)
  allData=await loadFromCloud();
  const mk=monthKey(viewYear,viewMonth);
  if(!allData[mk]) allData[mk]={};
  const dk=String(now.getDate());
  if(!allData[mk][dk]) allData[mk][dk]={holiday:false,otInput:'',endTime:'17:00',metersInput:'',metersArr:[],metersLocked:false,timeLocked:false,expanded:true};
  else{allData[mk][dk].expanded=true;if(!allData[mk][dk].metersArr) allData[mk][dk].metersArr=parseMeters(allData[mk][dk].metersInput||'');}
  save();renderAll();setTimeout(scrollToToday,80);
}

onAuthStateChanged(auth, user=>{
  if(user){
    hideLoginScreen();
    initApp();
  } else {
    showLoginScreen();
  }
});
</script>
