
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kengle Chu 毅合實業工作紀錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f5f6f8;
  --bg2: #ffffff;
  --bg3: #f0f2f5;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --text: #1a1d24;
  --text2: #5a5f70;
  --text3: #9fa5b5;
  --accent: #2563eb;
  --accent-dim: #eff4ff;
  --accent-border: #bfcfff;
  --green: #16a34a;
  --green-dim: #f0fdf4;
  --green-border: #bbf7d0;
  --amber: #b45309;
  --amber-dim: #fffbeb;
  --amber-border: #fde68a;
  --red: #dc2626;
  --red-dim: #fef2f2;
  --red-border: #fecaca;
  --radius: 14px;
  --radius-sm: 9px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif}

.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:18px 16px 14px;position:sticky;top:0;z-index:10;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.header-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.header-name{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.01em;line-height:1.15}
.header-company{font-size:15px;font-weight:500;color:var(--text2);margin-top:3px}
.month-nav{display:flex;align-items:center;gap:6px;margin-top:6px}
.month-nav button{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:34px;height:34px;border-radius:9px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav button:active{background:var(--accent-dim);border-color:var(--accent-border)}
.month-label{font-size:15px;font-weight:700;min-width:68px;text-align:center;font-family:'DM Mono',monospace;color:var(--text)}

.summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 12px 6px}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:5px;letter-spacing:0.04em;text-transform:uppercase;font-weight:500}
.stat-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.stat-val.c-accent{color:var(--accent)}
.stat-val.c-green{color:var(--green)}
.stat-val.c-amber{color:var(--amber)}

.toolbar{display:flex;gap:8px;padding:6px 12px 8px;overflow-x:auto}
.toolbar::-webkit-scrollbar{display:none}
.tool-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif}
.tool-btn:active{opacity:0.75}
.tool-btn-export{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.tool-btn-clear{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}

.days-list{padding:6px 12px 90px;display:flex;flex-direction:column;gap:8px}

.day-card{background:var(--bg2);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.day-card.is-weekend{border-left:3px solid var(--accent-border)}
.day-card.is-today{border-left:3px solid var(--accent)}
.day-card.is-holiday{opacity:0.55}

.day-header{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;user-select:none}
.day-date{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;min-width:56px;color:var(--text)}
.day-weekday{font-size:12px;color:var(--text3);min-width:16px}
.is-weekend .day-weekday{color:var(--accent)}
.day-times{display:flex;gap:6px;align-items:center;flex:1}
.time-chip{font-size:12px;font-family:'DM Mono',monospace;color:var(--text2);background:var(--bg3);padding:3px 8px;border-radius:6px}
.time-chip.ot{color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border)}
.arrow{font-size:10px;color:var(--text3)}
.day-pay{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);margin-left:auto;white-space:nowrap}
.day-pay.zero{color:var(--text3);font-weight:400}
.holiday-badge{font-size:11px;background:var(--red-dim);color:var(--red);padding:3px 9px;border-radius:6px;margin-left:auto;border:1px solid var(--red-border)}
.chevron{font-size:12px;color:var(--text3);margin-left:4px;transition:transform 0.2s;display:inline-block}
.chevron.open{transform:rotate(180deg)}

.day-summary-line{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:5px 13px 9px}
.dsb{font-size:11px;color:var(--text3)}
.dsb span{color:var(--text2);font-weight:500}

.day-body{border-top:1px solid var(--border);padding:12px 13px;display:flex;flex-direction:column;gap:11px}
.field-row{display:flex;align-items:center;gap:8px}
.field-label{font-size:12px;color:var(--text3);min-width:52px;font-weight:500}
.field-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:15px;font-family:'DM Mono',monospace;padding:10px 12px;outline:none;-webkit-appearance:none;min-width:0}
.field-input:focus{border-color:var(--accent);background:#fff}

.btn{border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;padding:10px 15px;white-space:nowrap;font-family:'Noto Sans TC',sans-serif}
.btn:active{opacity:0.7}
.btn-primary{background:var(--accent);color:#fff}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.btn-warning{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}

.badge-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge-item{display:flex;align-items:center;gap:5px}
.badge-lbl{font-size:11px;color:var(--text3)}
.badge{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:20px}
.badge-blue{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}

.locked-row{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.locked-text{font-size:13px;font-family:'DM Mono',monospace;color:var(--text2);word-break:break-all;flex:1}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border-radius:18px;padding:26px 22px 20px;max-width:320px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal-icon{font-size:34px;margin-bottom:10px}
.modal h2{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.modal p{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:22px}
.modal-actions{display:flex;gap:10px}
.modal-actions .btn{flex:1;text-align:center}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-name">Kengle Chu</div>
      <div class="header-company">毅合實業工作紀錄</div>
    </div>
    <div class="month-nav">
      <button id="btnPrev">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button id="btnNext">›</button>
    </div>
  </div>
</div>

<div class="summary">
  <div class="stat-card"><div class="stat-label">本月加班費</div><div class="stat-val c-accent" id="sumPay">$0</div></div>
  <div class="stat-card"><div class="stat-label">加班時數</div><div class="stat-val" id="sumHours">0h 0m</div></div>
  <div class="stat-card"><div class="stat-label">總趟次</div><div class="stat-val c-green" id="sumTrips">0</div></div>
  <div class="stat-card"><div class="stat-label">總米數</div><div class="stat-val c-amber" id="sumMeters">0</div></div>
</div>

<div class="toolbar">
  <button class="tool-btn tool-btn-export" id="btnExport">⬇ 匯出 Excel</button>
  <button class="tool-btn tool-btn-clear" id="btnClear">🗑 清除本月資料</button>
</div>

<div class="days-list" id="daysList"></div>

<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal">
    <div class="modal-icon">⚠️</div>
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">取消</button>
      <button class="btn btn-danger" id="modalConfirm">確認清除</button>
    </div>
  </div>
</div>

<script>
const STORE_KEY='kengle_data_v2';
const WD=['日','一','二','三','四','五','六'];

function load(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return {};}}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(allData));}catch(e){}}

let allData=load();
let viewYear,viewMonth;

function monthKey(y,m){return `${y}_${String(m+1).padStart(2,'0')}`;}

function getRows(y,m){
  const mk=monthKey(y,m);
  if(!allData[mk]) allData[mk]={};
  const rows=[];
  for(let d=1;d<=31;d++){
    const dt=new Date(y,m,d);
    if(dt.getMonth()!==m) break;
    const dk=String(d);
    if(!allData[mk][dk]) allData[mk][dk]={holiday:false,otInput:'',endTime:'17:00',metersInput:'',metersLocked:false,expanded:false};
    rows.push({d,dt,wd:dt.getDay(),isWeekend:dt.getDay()===0||dt.getDay()===6,dk,data:allData[mk][dk]});
  }
  return rows;
}

function calcPay(h,m){
  const end=h*60+m;
  if(end<=17*60) return 0;
  let t=0;
  [{f:17*60,to:20*60,r:3.5},{f:20*60,to:24*60,r:4.5},{f:24*60,to:32*60,r:9}].forEach(s=>{
    const a=Math.max(s.f,17*60),b=Math.min(s.to,end);
    if(b>a) t+=(b-a)*s.r;
  });
  return Math.round(t);
}

function sumNums(str){const n=str.trim().split(/\s+/).filter(v=>v!=='').map(v=>parseFloat(v)||0);return{count:n.length,total:n.reduce((a,b)=>a+b,0)};}

function parseFmtTime(raw){
  const s=raw.replace(/[^0-9]/g,'');
  if(!s.length) return null;
  let h,m;
  if(s.length<=2){h=parseInt(s);m=0;}
  else if(s.length===3){h=parseInt(s[0]);m=parseInt(s.slice(1));}
  else{h=parseInt(s.slice(0,2));m=parseInt(s.slice(2,4));}
  if(isNaN(h)||isNaN(m)||h>23||m>59) return null;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}

function nowStr(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function fmtDate(dt){return `${dt.getMonth()+1}/${String(dt.getDate()).padStart(2,'0')}`;}

function updateSummary(rows){
  let tpay=0,totMin=0,ttrips=0,tmeters=0;
  rows.forEach(r=>{
    if(r.data.holiday) return;
    const[eh,em]=r.data.endTime.split(':').map(Number);
    tpay+=calcPay(eh,em);totMin+=Math.max(0,eh*60+em-17*60);
    const res=sumNums(r.data.metersInput);
    ttrips+=res.count;tmeters+=res.total;
  });
  document.getElementById('sumPay').textContent='$'+tpay.toLocaleString();
  document.getElementById('sumHours').textContent=Math.floor(totMin/60)+'h '+(totMin%60)+'m';
  document.getElementById('sumTrips').textContent=ttrips;
  document.getElementById('sumMeters').textContent=tmeters.toLocaleString()+' m';
}

function renderAll(){
  const now=new Date();
  const todayY=now.getFullYear(),todayM=now.getMonth(),todayD=now.getDate();
  document.getElementById('monthLabel').textContent=`${viewYear}/${String(viewMonth+1).padStart(2,'0')}`;
  const rows=getRows(viewYear,viewMonth);
  updateSummary(rows);
  const list=document.getElementById('daysList');
  list.innerHTML='';

  rows.forEach(r=>{
    const isToday=viewYear===todayY&&viewMonth===todayM&&r.d===todayD;
    const d=r.data;
    const payVal=d.holiday?0:(()=>{const[h,m]=d.endTime.split(':').map(Number);return calcPay(h,m);})();
    const mRes=sumNums(d.metersInput);

    const card=document.createElement('div');
    card.className='day-card'+(r.isWeekend?' is-weekend':'')+(d.holiday?' is-holiday':'')+(isToday?' is-today':'');

    // HEADER
    const hdr=document.createElement('div');
    hdr.className='day-header';

    const dateEl=document.createElement('div');dateEl.className='day-date';dateEl.textContent=fmtDate(r.dt);
    const wdEl=document.createElement('div');wdEl.className='day-weekday';wdEl.textContent=WD[r.wd];
    hdr.appendChild(dateEl);hdr.appendChild(wdEl);

    if(d.holiday){
      const hb=document.createElement('div');hb.className='holiday-badge';hb.textContent='休假';hdr.appendChild(hb);
    } else {
      const times=document.createElement('div');times.className='day-times';
      const c1=document.createElement('span');c1.className='time-chip';c1.textContent='08:00';
      const arr=document.createElement('span');arr.className='arrow';arr.textContent='→';
      const c2=document.createElement('span');c2.className='time-chip'+(d.endTime!=='17:00'?' ot':'');c2.textContent=d.endTime;
      times.appendChild(c1);times.appendChild(arr);times.appendChild(c2);hdr.appendChild(times);
      const payEl=document.createElement('div');payEl.className='day-pay'+(payVal===0?' zero':'');payEl.textContent=payVal>0?'$'+payVal.toLocaleString():'—';hdr.appendChild(payEl);
    }

    const chev=document.createElement('span');chev.className='chevron'+(d.expanded?' open':'');chev.textContent='▾';hdr.appendChild(chev);
    hdr.addEventListener('click',()=>{d.expanded=!d.expanded;save();renderAll();});
    card.appendChild(hdr);

    // Collapsed summary
    if(!d.expanded&&!d.holiday&&mRes.count>0){
      const sl=document.createElement('div');sl.className='day-summary-line';
      sl.innerHTML=`<span class="dsb">趟次 <span>${mRes.count}</span></span><span class="dsb">米數 <span>${mRes.total.toLocaleString()} m</span></span>${d.metersLocked?'<span class="badge badge-green" style="font-size:10px;padding:2px 7px">已確認</span>':''}`;
      card.appendChild(sl);
    }

    // BODY
    if(d.expanded){
      const body=document.createElement('div');body.className='day-body';

      if(d.holiday){
        const btn=document.createElement('button');btn.className='btn btn-ghost';btn.textContent='取消休假';
        btn.addEventListener('click',()=>{d.holiday=false;d.expanded=true;save();renderAll();});
        body.appendChild(btn);
      } else {
        // Clock-out row
        const otRow=document.createElement('div');otRow.className='field-row';
        const otLbl=document.createElement('div');otLbl.className='field-label';otLbl.textContent='下班時間';
        const otInp=document.createElement('input');otInp.type='text';otInp.inputMode='numeric';
        otInp.className='field-input';otInp.placeholder='2100';otInp.value=d.otInput;
        otInp.addEventListener('input',()=>{d.otInput=otInp.value;save();});
        const otBtn=document.createElement('button');otBtn.className='btn btn-primary';otBtn.textContent='下班';
        otBtn.addEventListener('click',()=>{
          const raw=otInp.value.trim();
          const t=raw===''?nowStr():parseFmtTime(raw);
          if(!t){otInp.style.borderColor='var(--red)';setTimeout(()=>otInp.style.borderColor='',1200);return;}
          d.endTime=t;d.otInput=raw;save();renderAll();
        });
        otRow.appendChild(otLbl);otRow.appendChild(otInp);otRow.appendChild(otBtn);
        body.appendChild(otRow);

        // Meters row
        const mRow=document.createElement('div');mRow.className='field-row';
        const mLbl=document.createElement('div');mLbl.className='field-label';mLbl.textContent='米數';

        if(d.metersLocked){
          const ld=document.createElement('div');ld.className='locked-row';
          const lt=document.createElement('span');lt.className='locked-text';lt.textContent=d.metersInput||'—';
          const editBtn=document.createElement('button');editBtn.className='btn btn-warning';editBtn.textContent='修改';
          editBtn.addEventListener('click',()=>{d.metersLocked=false;save();renderAll();});
          ld.appendChild(lt);ld.appendChild(editBtn);
          mRow.appendChild(mLbl);mRow.appendChild(ld);
        } else {
          const mInp=document.createElement('input');mInp.type='text';mInp.inputMode='decimal';
          mInp.className='field-input';mInp.placeholder='120 80 60';mInp.value=d.metersInput;
          mInp.addEventListener('input',()=>{d.metersInput=mInp.value;save();renderAll();});
          const confirmBtn=document.createElement('button');confirmBtn.className='btn btn-success';confirmBtn.textContent='確認';
          confirmBtn.addEventListener('click',()=>{d.metersInput=mInp.value;d.metersLocked=true;save();renderAll();});
          mRow.appendChild(mLbl);mRow.appendChild(mInp);mRow.appendChild(confirmBtn);
        }
        body.appendChild(mRow);

        // Badges
        const badgeRow=document.createElement('div');badgeRow.className='badge-row';
        badgeRow.innerHTML=`<div class="badge-item"><span class="badge-lbl">趟次</span><span class="badge badge-blue">${mRes.count}</span></div><div class="badge-item"><span class="badge-lbl">米數計</span><span class="badge badge-green">${mRes.total>0?mRes.total.toLocaleString():0}</span></div>`;
        body.appendChild(badgeRow);

        // Holiday btn
        const holBtn=document.createElement('button');holBtn.className='btn btn-danger';holBtn.textContent='標記休假';
        holBtn.addEventListener('click',()=>{d.holiday=true;d.endTime='17:00';d.otInput='';d.expanded=true;save();renderAll();});
        body.appendChild(holBtn);
      }
      card.appendChild(body);
    }
    list.appendChild(card);
  });
}

// Month nav
document.getElementById('btnPrev').addEventListener('click',()=>{viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}renderAll();});
document.getElementById('btnNext').addEventListener('click',()=>{viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}renderAll();});

// Modal
let pendingAction=null;
function showModal(title,desc,action){
  pendingAction=action;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalDesc').textContent=desc;
  document.getElementById('confirmModal').classList.remove('hidden');
}
document.getElementById('modalCancel').addEventListener('click',()=>{document.getElementById('confirmModal').classList.add('hidden');pendingAction=null;});
document.getElementById('modalConfirm').addEventListener('click',()=>{document.getElementById('confirmModal').classList.add('hidden');if(pendingAction)pendingAction();pendingAction=null;});
document.getElementById('confirmModal').addEventListener('click',e=>{if(e.target===document.getElementById('confirmModal')){document.getElementById('confirmModal').classList.add('hidden');pendingAction=null;}});

// Clear
document.getElementById('btnClear').addEventListener('click',()=>{
  const label=`${viewYear} 年 ${viewMonth+1} 月`;
  showModal('確認清除資料？',`此操作將永久刪除 ${label} 的所有出勤、加班及工作紀錄，且無法復原。確定要繼續嗎？`,()=>{
    const mk=monthKey(viewYear,viewMonth);
    delete allData[mk];
    save();
    renderAll();
  });
});

// Export Excel
document.getElementById('btnExport').addEventListener('click',()=>{
  const rows=getRows(viewYear,viewMonth);
  const wb=XLSX.utils.book_new();
  const headers=['日期','星期','上班時間','下班時間','加班費($)','趟次','米數明細','米數合計(m)','備註'];
  const data=[headers];
  let totalPay=0,totalTrips=0,totalMeters=0,totalOTMin=0;

  rows.forEach(r=>{
    const d=r.data;
    if(d.holiday){data.push([fmtDate(r.dt),WD[r.wd],'—','—','—','—','—','—','休假']);return;}
    const[eh,em]=d.endTime.split(':').map(Number);
    const pay=calcPay(eh,em);
    const mRes=sumNums(d.metersInput);
    totalPay+=pay;totalTrips+=mRes.count;totalMeters+=mRes.total;
    totalOTMin+=Math.max(0,eh*60+em-17*60);
    data.push([fmtDate(r.dt),WD[r.wd],'08:00',d.endTime,pay,mRes.count,d.metersInput,mRes.total,d.metersLocked?'已確認':'']);
  });

  data.push([]);
  data.push(['合計','','','',totalPay,totalTrips,'',totalMeters,'加班時數：'+Math.floor(totalOTMin/60)+'h '+(totalOTMin%60)+'m']);

  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:10},{wch:6},{wch:10},{wch:10},{wch:10},{wch:6},{wch:24},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,`${viewYear}-${String(viewMonth+1).padStart(2,'0')}`);
  XLSX.writeFile(wb,`毅合實業工作紀錄_${viewYear}${String(viewMonth+1).padStart(2,'0')}.xlsx`);
});

// Init
const now=new Date();
viewYear=now.getFullYear();viewMonth=now.getMonth();
const mk=monthKey(viewYear,viewMonth);
if(!allData[mk]) allData[mk]={};
const dk=String(now.getDate());
